name: Build Windows Proxy Pack

on:
  push:
    paths:
      - 'emmi/emmi_proxy.py'
      - '.github/workflows/build_proxy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Proxy Executable
      run: |
        cd emmi
        pyinstaller --onefile --noconsole emmi_proxy.py

    - name: Package Unified Bridge ZIP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir EMMI_Bridge_Pack
        # Download the original 400MB installer/extractor
        gh release download v1.0.0 -p "EMMI_Bridge_Installer.exe" -D temp_download
        
        # Extract the contents (compilation folder, emmi bridge folder) using 7z
        7z x "temp_download\EMMI_Bridge_Installer.exe" -oEMMI_Bridge_Pack\
        
        # DEBUG: List what 7z extracted so we can verify the structure
        Write-Host "=== Extracted contents ==="
        Get-ChildItem -Recurse EMMI_Bridge_Pack | Select-Object FullName | Format-Table -AutoSize
        
        # Copy the newly built proxy executable
        copy "emmi\dist\emmi_proxy.exe" EMMI_Bridge_Pack\
        
        # Copy the startup batch file
        copy "emmi\Start_EMMI_Bridge.bat" EMMI_Bridge_Pack\
        
        # Zip the entire folder for a ready-to-run experience
        Compress-Archive -Path "EMMI_Bridge_Pack\*" -DestinationPath "EMMI_Bridge_with_Proxy.zip"

    - name: Upload to GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload v1.0.0 EMMI_Bridge_with_Proxy.zip --clobber

    - name: Upload Artifact (Optional)
      uses: actions/upload-artifact@v4
      with:
        name: EMMI_Bridge_with_Proxy
        path: EMMI_Bridge_with_Proxy.zip
