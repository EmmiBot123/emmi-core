name: Build Windows Proxy Pack

on:
  push:
    paths:
      - 'emmi/emmi_proxy.py'
      - '.github/workflows/build_proxy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Proxy Executable
      run: |
        cd emmi
        pyinstaller --onefile --noconsole emmi_proxy.py

    - name: Package Unified Bridge ZIP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir EMMI_Bridge_Proxy_Pack
        # Download the original bridge executable from the current release
        gh release download v1.0.0 -p "EMMI_Bridge_Installer.exe" -D EMMI_Bridge_Proxy_Pack

        # The downloaded file is named EMMI_Bridge_Installer.exe, rename it to emmi-bridge.exe to match the batch script
        Rename-Item -Path "EMMI_Bridge_Proxy_Pack\EMMI_Bridge_Installer.exe" -NewName "emmi-bridge.exe"
        
        # Copy the newly built proxy executable
        copy "emmi\dist\emmi_proxy.exe" EMMI_Bridge_Proxy_Pack\
        
        # Copy the startup batch file
        copy "emmi\Start_EMMI_Bridge.bat" EMMI_Bridge_Proxy_Pack\
        
        # Zip them together
        Compress-Archive -Path "EMMI_Bridge_Proxy_Pack\*" -DestinationPath "EMMI_Bridge_with_Proxy.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EMMI_Bridge_with_Proxy
        path: EMMI_Bridge_with_Proxy.zip
